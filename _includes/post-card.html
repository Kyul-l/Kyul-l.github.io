<article class="post-card">
  <div class="post-card__head">
    <h2 class="post-card__title"><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
    {% if post.date %}<time class="post-card__date" datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%b %-d, %Y" }}</time>{% endif %}
  </div>
  {% if post.excerpt %}
    <p class="post-card__excerpt">{{ post.excerpt | strip_html | normalize_whitespace | truncate: 180 }}</p>
  {% endif %}
  {% if post.tags.size > 0 %}
    <ul class="post-card__tags">
      {% for tag in post.tags %}<li class="chip">{{ tag }}</li>{% endfor %}
    </ul>
  {% endif %}
</article>
