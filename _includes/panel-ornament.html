
{%- assign preset = include.preset | default: 'terminal' -%}
<div class="panel-ornament panel-ornament--{{ preset }}" aria-hidden="true">
  {%- if preset == 'terminal' -%}
    <span class="pm on-top"    style="left:150px;font-size:14px;">✦</span>
    <span class="pm on-top"    style="left:174px;font-size:7px;opacity:.6;">⋆</span>
    <span class="pm on-top"    style="left:190px;font-size:5px;opacity:.5;">·</span>
    <span class="pm on-top"    style="left:212px;font-size:10px;opacity:.7;">✦</span>
    <span class="pm on-top"    style="left:232px;font-size:6px;opacity:.55;">⋆</span>
    <span class="pm on-right"  style="top:170px;font-size:10px;opacity:.6;">✦</span>
    <span class="pm on-right"  style="top:196px;font-size:5px;opacity:.5;">·</span>
    <span class="pm on-bottom" style="left:70%;font-size:12px;opacity:.7;">✦</span>
    <span class="pm on-bottom" style="left:75%;font-size:6px;opacity:.55;">⋆</span>
    <span class="pm on-bottom" style="left:80%;font-size:5px;opacity:.5;">·</span>
    <span class="pm on-left"   style="top:100px;font-size:9px;opacity:.6;">✦</span>
    <span class="pm on-left"   style="bottom:180px;font-size:7px;opacity:.55;">⋆</span>
  {%- elsif preset == 'recent' -%}
    <span class="pm on-top"    style="right:38px;font-size:12px;">✦</span>
    <span class="pm on-top"    style="right:60px;font-size:5px;opacity:.5;">·</span>
    <span class="pm on-top"    style="right:22px;font-size:6px;opacity:.55;">⋆</span>
    <span class="pm on-right"  style="top:36%;font-size:10px;opacity:.6;">✦</span>
    <span class="pm on-right"  style="top:66%;font-size:6px;opacity:.5;">·</span>
    <span class="pm on-bottom" style="left:38px;font-size:10px;opacity:.65;">✦</span>
    <span class="pm on-bottom" style="left:56px;font-size:5px;opacity:.5;">·</span>
  {%- endif -%}
</div>
