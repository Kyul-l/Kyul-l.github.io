
# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# (see https://jekyllrb.com/docs/data-files/) for data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: "Kyul's Log"
author:
  name: Kyul
  bio: "Cloud Red Team · Security Research"
  email: kyull.lkr@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Notes from a quiet observer. Cloud red teaming, security research, and the systems behind them.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://kyul-l.github.io" # the base hostname & protocol for your site, e.g. http://example.com
github_username:  Kyul-l

# Build settings
markdown: kramdown
theme: null # We are building our own theme
plugins:
  - jekyll-paginate

# Pagination (Log = posts)
paginate: 5
paginate_path: "/log/page:num/"

# Permalinks
permalink: /log/:title/

# Collections — three sections
collections:
  wiki:
    output: true
    permalink: /wiki/:name/
  studies:
    output: true
    permalink: /studies/:name/

defaults:
  - scope:
      path: ""
      type: wiki
    values:
      layout: post
      section: wiki
  - scope:
      path: ""
      type: studies
    values:
      layout: post
      section: studies
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      section: log

# Comments disabled — email-only contact routing
# Reach out via kyull.lkr@gmail.com

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the 'exclude:' key here will be automatically added to
# the internal list.
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the 'include:' list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
