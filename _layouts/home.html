---
layout: default
---
<div class="home-stage">

  <div class="mac-terminal-wrapper scene">
    <div class="mac-terminal-glow-container">
      <div class="mac-terminal">
        <div class="bloom"></div>

        <!-- Single outer chrome: ONE label + ONE pulse dot -->
        <div class="panel-chrome">
          <span class="panel-label">// archive</span>
          <span class="panel-dot panel-dot--pulse"></span>
        </div>

        <!-- Internal vertical split: 60% prompt / 40% log stream -->
        <div class="terminal-split">

          <!-- LEFT: prompt pane (60%) -->
          <div class="terminal-split__left terminal-pane--prompt">
            <div class="body" id="terminal-window" role="region" aria-live="polite">
              <div id="terminal-output"></div>
            </div>
            <div class="prompt-wrapper">
              <div id="autocomplete-suggestions" class="autocomplete-suggestions"></div>
              <div class="terminal-input-line">
                <span class="prompt">>&nbsp;</span>
                <input type="text" id="terminal-input" class="terminal-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-label="Command input">
                <div class="footer-line" id="terminal-status">STATUS · OPERATIONAL</div>
              </div>
            </div>
          </div>

          <!-- DIVIDER: 1px vertical line -->
          <div class="terminal-split__divider" aria-hidden="true"></div>

          <!-- RIGHT: log stream pane (40%) -->
          <div class="terminal-split__right terminal-pane--logstream">
            <div class="logstream-chrome">
              <span class="logstream-label">// log stream</span>
              <span class="logstream-dot panel-dot--pulse"></span>
            </div>
            <div class="logstream-rule" aria-hidden="true"></div>
            <div class="log-stream__list" id="log-stream-body" aria-label="Recent entries" aria-hidden="true"></div>
          </div>

        </div><!-- /.terminal-split -->
      </div><!-- /.mac-terminal -->
    </div><!-- /.mac-terminal-glow-container -->
  </div><!-- /.mac-terminal-wrapper -->

</div><!-- /.home-stage -->

<noscript>
  <div class="noscript-warning">
    <p>This website's terminal interface requires JavaScript to function. Please enable it to use the terminal.</p>
  </div>
</noscript>

<script>
  window.__TERMINAL_COMMANDS__ = {{ site.data.commands | jsonify }};

  window.__LOG_STREAM__ = [
    {% assign all_docs = site.wiki | concat: site.studies | concat: site.posts %}
    {% assign sorted_docs = all_docs | sort: 'date' | reverse %}
    {% for doc in sorted_docs limit:12 %}
    {
      "sigil": {% if doc.collection == 'wiki' %}"✦"{% elsif doc.collection == 'studies' %}"⌖"{% else %}"✺"{% endif %},
      "title": {{ doc.title | jsonify }},
      "section": {% if doc.collection == 'wiki' %}"wiki"{% elsif doc.collection == 'studies' %}"studies"{% else %}"log"{% endif %},
      "time": {{ doc.date | date: '%H:%M' | jsonify }},
      "url": {{ doc.url | relative_url | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];
</script>

<script defer src="{{ '/assets/js/ui-effects.js' | relative_url }}"></script>
<script defer type="module" src="{{ '/assets/js/feed.js' | relative_url }}"></script>
