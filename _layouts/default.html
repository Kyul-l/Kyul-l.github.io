<!DOCTYPE html>
<!-- if you choose, walk fully. do not pretend. -->
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% if page.title %}{{ page.title | escape }} • {% endif %}{{ site.title | escape }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
  <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
  <!-- <meta property="og:image" content="{{ site.url }}/assets/images/og-image.png"> -->

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="{{ page.url | absolute_url }}">
  <meta property="twitter:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
  <meta property="twitter:description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
  <!-- <meta property="twitter:image" content="{{ site.url }}/assets/images/twitter-card.png"> -->

  <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
  <link rel="icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">

  <!-- Google Fonts for new terminal design -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Source+Code+Pro&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/vis-network/styles/vis-network.min.css" type="text/css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <!-- Theme switcher to prevent FOUC (Flash of Unstyled Content) -->
  <script>
    (function() {
      var theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body class="{% if page.layout == 'home' %}layout-home{% endif %}">
  <a class="skip-to-content" href="#main-content">콘텐츠로 건너뛰기</a>

  <div class="container">
    <header class="site-header">
      <a class="site-title" href="{{ "/" | relative_url }}">{{ site.title }}</a>
      <div class="site-header-right">
          <nav class="site-nav">
            <a class="nav-wiki"    href="{{ "/wiki/"    | relative_url }}"><span class="nav-sigil">✦</span>Wiki</a>
            <a class="nav-studies" href="{{ "/studies/" | relative_url }}"><span class="nav-sigil">✦</span>Studies</a>
            <a class="nav-log"     href="{{ "/log/"     | relative_url }}"><span class="nav-sigil">✦</span>Log</a>
          </nav>
          <span class="nav-divider" aria-hidden="true"></span>
          <button id="lang-toggle" class="lang-toggle" aria-label="Toggle language" title="Language toggle (EN coming soon)">
            <span class="lang-label">KO</span>
          </button>
          <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
      </div>    </header>

    <main id="main-content" class="site-main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p class="footer-contact">
        A quiet inbox, always open.
        <a href="mailto:cityll.kr@gmail.com">cityll.kr@gmail.com</a>
      </p>
    </footer>

  </div>

  <!-- Defer scripts for performance -->
  <script type="module" defer src="{{ '/assets/js/theme.js' | relative_url }}"></script>
  <script type="module" src="{{ '/assets/js/graph.js' | relative_url }}"></script>
  {% if page.layout == 'home' %}
    <script type="module" src="{{ '/assets/js/terminal.js' | relative_url }}"></script>
  {% endif %}
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js" defer></script>

  <div id="map-modal" class="modal" style="display: none;">
    <div class="modal-content panel">
      <span class="close-button">&times;</span>
      <div id="knowledge-graph-modal"></div>
    </div>
  </div>
  <!-- The graph will be rendered on a separate page -->

  <div id="graph-overlay" class="graph-overlay">
    <div id="knowledge-graph-container" class="knowledge-graph-container">
      <span class="close-overlay-button">&times;</span>
      <div id="graph-loader" class="graph-loader" aria-hidden="true">· ⋆ ✦</div>
      <div class="graph-canvas-wrapper"></div>
      <div class="graph-controls">
        <button id="start-timelapse" class="button button-glass">Start Timelapse</button>
        <button id="reset-graph" class="button button-glass">Reset Graph</button>
      </div>
    </div>
  </div>
</body>
</html>
