---
layout: page
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.date %}<p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>{% endif %}
    {% if page.tags.size > 0 %}
      <ul class="post-tags">
        {% for tag in page.tags %}<li class="chip">{{ tag }}</li>{% endfor %}
      </ul>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  {% include divider.html %}
</article>

{% include related-posts.html %}
