---
layout: page
---
<div class="log-page">

  <header class="log-header">
    <div class="log-header__left">
      <h1 class="log-header__title"><span aria-hidden="true">✺</span> Log</h1>
      <p class="log-header__lead">Reflections and notes, thoughts preserved.</p>
    </div>
  </header>

  <!-- Toolbar: type filter chips + shuffle -->
  <div class="log-toolbar" role="toolbar" aria-label="Log filters and controls">
    <div class="log-toolbar__filters" role="group" aria-label="Filter by type">
      <button class="log-filter-chip is-active" data-filter="all" type="button">all</button>
      <button class="log-filter-chip" data-filter="moment" type="button">moment</button>
      <button class="log-filter-chip" data-filter="food" type="button">food</button>
      <button class="log-filter-chip" data-filter="thought" type="button">thought</button>
      <button class="log-filter-chip" data-filter="object" type="button">object</button>
      <button class="log-filter-chip" data-filter="signal" type="button">signal</button>
    </div>
    <div class="log-toolbar__actions">
      <button class="log-shuffle" type="button" aria-label="Shuffle cards" title="Shuffle">↻ shuffle</button>
    </div>
  </div>

  <!-- Cabinet Drawer list -->
  <div class="log-drawers" id="log-drawers" role="region" aria-label="Log collections">
    <!-- drawers rendered by JS from window.__LOG_DRAWERS__ -->
    <noscript>
      <ul class="log-nojs-list">
        {% for post in site.posts %}
          <li>
            <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
            <span class="log-nojs-meta">{{ post.type | default: "moment" }} · {{ post.collection | default: "Uncollected" }} · {{ post.period }}</span>
          </li>
        {% endfor %}
      </ul>
    </noscript>
  </div>

</div>

<!-- Seed drawer data for JS -->
<script>
(function () {
  var collections = {};
  var allCards = [];

  {% assign sorted_posts = site.posts | sort: 'date' | reverse %}
  {% for post in sorted_posts %}
  (function () {
    var col = {{ post.collection | default: "Uncollected" | jsonify }};
    var card = {
      number: "{{ forloop.index | prepend: '000' | slice: -3, 3 }}",
      title: {{ post.title | jsonify }},
      type: {{ post.type | default: "moment" | jsonify }},
      collection: col,
      period: {{ post.period | default: "" | jsonify }},
      fragment: {{ post.fragment | default: "" | jsonify }},
      tags: {{ post.tags | jsonify }},
      rarity: {{ post.rarity | default: "" | jsonify }},
      body: {{ post.content | jsonify }},
      url: "{{ post.url | relative_url }}"
    };
    allCards.push(card);
    if (!collections[col]) collections[col] = [];
    collections[col].push(card);
  })();
  {% endfor %}

  // Build ordered collections array (preserve insertion order = newest-first per Jekyll sort)
  var collectionNames = [];
  for (var k in collections) {
    if (Object.prototype.hasOwnProperty.call(collections, k)) {
      collectionNames.push(k);
    }
  }

  window.__LOG_DRAWERS__ = {
    collections: collectionNames.map(function (name) {
      return { name: name, cards: collections[name] };
    }),
    allCards: allCards
  };
})();
</script>

<!-- Detail view overlay (mounted by JS) -->
<div id="log-detail-overlay" class="log-detail-overlay" role="dialog" aria-modal="true" aria-label="Card detail" hidden></div>

<script src="{{ '/assets/js/log-deck.js' | relative_url }}" defer></script>
